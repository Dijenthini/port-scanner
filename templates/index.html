<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Network Reconnaissance Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0a0618;
            color: #e8e0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
        }
        .card {
            background: #1a1035;
            border: 1px solid #3a2a6a;
            border-radius: 16px;
            padding: 28px;
        }
        .card-header h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6, #6d3bd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-group input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #3a2a6a;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #e8e0f5;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        .btn-scan {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            background: linear-gradient(135deg, #8b5cf6, #6d3bd8);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-scan:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-text {
            font-size: 14px;
            color: #a890d0;
        }
        .progress {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .results-section h3 {
            color: #c4b5fd !important;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table th {
            text-align: left;
            padding: 10px 14px;
            color: #a890d0;
            border-bottom: 1px solid #3a2a6a;
            font-weight: 600;
        }
        table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #e8e0f5 !important;
        }
        table td strong {
            color: #ffffff !important;
            font-weight: 700;
        }
        table td:nth-child(3) {
            color: #c4b5fd !important;
            font-weight: 500;
        }
        .status-open {
            color: #a78bfa !important;
            font-weight: 600;
        }
        .vuln-none {
            color: #a78bfa !important;
            font-weight: 600;
        }
        .vuln-found {
            color: #f87171 !important;
            font-weight: 600;
        }
        table tbody tr:hover {
            background: rgba(139, 92, 246, 0.08);
        }
        .btn-export {
            margin-top: 16px;
            padding: 8px 20px;
            border: 1px solid #3a2a6a;
            border-radius: 8px;
            background: transparent;
            color: #a890d0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-export:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: #8b5cf6;
            color: #e8e0f5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🔍 Network Reconnaissance Toolkit</h1>
        </div>

        <div class="input-group">
            <input type="text" id="targetInput" placeholder="Enter target (e.g., scanme.nmap.org)" value="scanme.nmap.org">
            <button class="btn-scan" id="scanBtn">🚀 Start Scan</button>
        </div>

        <div class="status-text" id="statusText">Ready to scan</div>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <h3>📊 Open Ports Found</h3>
            <table>
                <thead>
                    <tr>
                        <th>Port</th>
                        <th>Status</th>
                        <th>Service</th>
                        <th>Vulnerability</th>
                    </tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
            <button class="btn-export" id="exportBtn">📥 Export Report</button>
        </div>

    </div>
</div>

<script>
    const services = {
        21: 'FTP', 22: 'SSH', 23: 'Telnet', 25: 'SMTP',
        53: 'DNS', 80: 'HTTP', 110: 'POP3', 135: 'RPC',
        139: 'NetBIOS', 143: 'IMAP', 443: 'HTTPS', 445: 'SMB',
        993: 'IMAPS', 995: 'POP3S', 1723: 'PPTP', 3306: 'MySQL',
        3389: 'RDP', 5900: 'VNC', 8080: 'HTTP-Alt'
    };

    let interval = null;

    document.getElementById('scanBtn').addEventListener('click', function() {
        const target = document.getElementById('targetInput').value.trim();
        if (!target) {
            alert('Please enter a target');
            return;
        }

        console.log('Scanning:', target);

        this.disabled = true;
        this.textContent = '⏳ Scanning...';
        document.getElementById('statusText').textContent = '🔄 Scanning...';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('resultsSection').style.display = 'none';

        fetch('/api/scan/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: target })
        })
        .then(() => {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                fetch('/api/scan/status')
                    .then(r => r.json())
                    .then(status => {
                        console.log('Status:', status);
                        document.getElementById('progressBar').style.width = status.progress + '%';

                        if (status.open_ports && status.open_ports.length > 0) {
                            document.getElementById('resultsSection').style.display = 'block';
                            const table = document.getElementById('resultsTable');
                            table.innerHTML = '';
                            status.open_ports.forEach(port => {
                                const service = services[port] || 'Unknown';

                                let vulnHTML = '<span class="vuln-none">✅ None</span>';
                                if (status.vulnerabilities && status.vulnerabilities[port]) {
                                    const vulns = status.vulnerabilities[port];
                                    vulnHTML = vulns.map(v => `
                                        <span class="vuln-found">
                                            ⚠️ ${v.cve}
                                            <br><small>${v.severity}</small>
                                        </span>
                                    `).join('<br>');
                                }

                                table.innerHTML += `
                                    <tr>
                                        <td><strong>${port}</strong></td>
                                        <td class="status-open">✅ OPEN</td>
                                        <td>${service}</td>
                                        <td>${vulnHTML}</td>
                                    </tr>
                                `;
                            });
                        }

                        if (status.completed) {
                            clearInterval(interval);
                            document.getElementById('scanBtn').disabled = false;
                            document.getElementById('scanBtn').textContent = '🚀 Start Scan';
                            document.getElementById('statusText').textContent = '✅ Scan complete!';
                        }
                    });
            }, 1000);
        });
    });

    document.getElementById('exportBtn').addEventListener('click', function() {
        this.textContent = '⏳ Generating...';
        fetch('/api/scan/report', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                alert('✅ Reports generated successfully!');
                this.textContent = '📥 Export Report';
            })
            .catch(() => {
                this.textContent = '📥 Export Report';
                alert('Error generating report');
            });
    });
</script>

</body>
</html>
