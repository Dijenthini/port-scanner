<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Reconnaissance Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #e6edf3; }
        .container { max-width: 800px; margin-top: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .card-header { background: #0d1117; border-bottom: 1px solid #30363d; }
        .open-port { color: #3fb950; }
        .closed-port { color: #f85149; }
        .scanning { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="h3 mb-0">🔍 Network Reconnaissance Toolkit</h1>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="targetInput" class="form-control" 
                           placeholder="Enter target IP or hostname (e.g., 192.168.1.1)" 
                           value="localhost">
                    <button id="scanBtn" class="btn btn-danger">🚀 Start Scan</button>
                </div>

                <div class="mb-3">
                    <div class="progress">
                        <div id="progressBar" class="progress-bar bg-success" 
                             role="progressbar" style="width: 0%">0%</div>
                    </div>
                    <small id="statusText" class="text-muted">Ready to scan</small>
                </div>

                <div id="resultsSection" style="display: none;">
                    <h5 class="mb-2">📊 Open Ports Found</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-striped">
                            <thead>
                                <tr>
                                    <th>Port</th>
                                    <th>Status</th>
                                    <th>Service</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable">
                            </tbody>
                        </table>
                    </div>
                    <button id="exportBtn" class="btn btn-secondary btn-sm mt-2">
                        📥 Export Report
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('scanBtn').addEventListener('click', function() {
            const target = document.getElementById('targetInput').value;
            if (!target) {
                alert('Please enter a target');
                return;
            }

            this.disabled = true;
            document.getElementById('statusText').textContent = '🔄 Scanning...';

            fetch('/api/scan/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: target})
            })
            .then(response => response.json())
            .then(data => {
                console.log('Scan started:', data);
                const interval = setInterval(function() {
                    fetch('/api/scan/status')
                        .then(r => r.json())
                        .then(status => {
                            // Update progress
                            document.getElementById('progressBar').style.width = status.progress + '%';
                            document.getElementById('progressBar').textContent = status.progress + '%';

                            if (status.open_ports.length > 0) {
                                document.getElementById('resultsSection').style.display = 'block';
                                const table = document.getElementById('resultsTable');
                                table.innerHTML = '';
                                status.open_ports.forEach(port => {
                                    table.innerHTML += `
                                        <tr>
                                            <td><strong>${port}</strong></td>
                                            <td class="open-port">✅ OPEN</td>
                                            <td>Unknown</td>
                                        </tr>
                                    `;
                                });
                            }

                            if (status.completed) {
                                clearInterval(interval);
                                document.getElementById('scanBtn').disabled = false;
                                document.getElementById('statusText').textContent = '✅ Scan complete!';
                            }
                        });
                }, 1000);
            });
        });
        
        document.getElementById('exportBtn').addEventListener('click', function() {
            fetch('/api/scan/report')
                .then(r => r.json())
                .then(data => {
                    alert('Report generation coming soon!');
                });
        });
    </script>
</body>
</html>
