<!DOCTYPE html>
<html>
<head>
    <title>Port Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0a0e17;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #1a2332;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #2a3a4a;
        }
        h1 {
            color: #4a9eff;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-group input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3a4a;
            background: #0a0e17;
            color: #fff;
            font-size: 16px;
        }
        .btn-scan {
            padding: 12px 30px;
            background: #4a9eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-scan:hover {
            background: #3b7dd8;
        }
        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress {
            height: 8px;
            background: #2a3a4a;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4a9eff;
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            color: #8899aa;
            font-size: 14px;
            margin: 10px 0;
        }
        .results {
            margin-top: 20px;
            border-top: 1px solid #2a3a4a;
            padding-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 10px;
            color: #8899aa;
            border-bottom: 1px solid #2a3a4a;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .open {
            color: #3fb950;
        }
        .btn-export {
            margin-top: 15px;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #8899aa;
            cursor: pointer;
        }
        .btn-export:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Network Reconnaissance Toolkit</h1>

    <div class="input-group">
        <input type="text" id="target" value="localhost">
        <button class="btn-scan" id="scanBtn">Start Scan</button>
    </div>

    <div class="status" id="statusText">Ready to scan</div>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="results" id="resultsSection" style="display: none;">
        <h3>📊 Open Ports Found</h3>
        <table>
            <thead>
                <tr>
                    <th>Port</th>
                    <th>Status</th>
                    <th>Service</th>
                </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
        </table>
        <button class="btn-export" id="exportBtn">📥 Export Report</button>
    </div>
</div>

<script>
    const services = {
    22: 'SSH', 80: 'HTTP', 443: 'HTTPS',
    21: 'FTP', 23: 'Telnet', 25: 'SMTP',
    53: 'DNS', 110: 'POP3', 135: 'RPC',
    139: 'NetBIOS', 143: 'IMAP', 445: 'SMB',
    993: 'IMAPS', 995: 'POP3S', 1723: 'PPTP',
    3306: 'MySQL', 3389: 'RDP', 5900: 'VNC',
    8080: 'HTTP-Alt', 8443: 'HTTPS-Alt',
    32: 'SAP', 42: 'WINS', 52: 'XNS', 62: 'ACAS'
};

    let interval = null;

    document.getElementById('scanBtn').onclick = function() {
        const target = document.getElementById('target').value.trim();
        if (!target) {
            alert('Enter a target');
            return;
        }

        console.log('Scanning:', target);
        this.disabled = true;
        this.textContent = 'Scanning...';
        document.getElementById('statusText').textContent = '🔍 Scanning...';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('resultsSection').style.display = 'none';

        fetch('/api/scan/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: target })
        }).then(() => {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                fetch('/api/scan/status')
                    .then(r => r.json())
                    .then(data => {
                        console.log('Status:', data);
                        document.getElementById('progressBar').style.width = data.progress + '%';

                        if (data.open_ports && data.open_ports.length > 0) {
                            document.getElementById('resultsSection').style.display = 'block';
                            const table = document.getElementById('resultsTable');
                            table.innerHTML = '';
                            data.open_ports.forEach(port => {
                                const service = services[port] || 'Unknown';
                                table.innerHTML += `
                                    <tr>
                                        <td><strong>${port}</strong></td>
                                        <td class="open">✅ OPEN</td>
                                        <td>${service}</td>
                                    </tr>
                                `;
                            });
                        }

                        if (data.completed) {
                            clearInterval(interval);
                            document.getElementById('scanBtn').disabled = false;
                            document.getElementById('scanBtn').textContent = 'Start Scan';
                            document.getElementById('statusText').textContent = '✅ Scan complete!';
                            console.log('Scan complete!');
                        }
                    });
            }, 1000);
        });
    };

    document.getElementById('exportBtn').onclick = function() {
        this.textContent = 'Generating...';
        fetch('/api/scan/report', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                alert('Reports generated! Check your folder.');
                this.textContent = '📥 Export Report';
            })
            .catch(() => {
                alert('Error generating report');
                this.textContent = '📥 Export Report';
            });
    };
</script>

</body>
</html>
