<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Network Reconnaissance Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ===== GLOBAL STYLES ===== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111927;
            --bg-card: #1a2332;
            --border-color: #2a3a4a;
            --text-primary: #e8edf5;
            --text-secondary: #8899aa;
            --accent-blue: #4a9eff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(74, 158, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(63, 185, 80, 0.03) 0%, transparent 50%);
        }
        
        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }
        
        /* ===== CONTAINER ===== */
        .container {
            max-width: 1100px;
            margin-top: 40px;
            margin-bottom: 60px;
        }
        
        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #4a9eff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        /* ===== CARD ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        
        .card-header {
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-header .badge-status {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(63, 185, 80, 0.2);
        }
        
        .card-body {
            padding: 28px;
        }
        
        /* ===== INPUT GROUP ===== */
        .input-group-custom {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .input-group-custom .form-control {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input-group-custom .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .input-group-custom .form-control::placeholder {
            color: var(--text-secondary);
        }
        
        .btn-scan {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            background: linear-gradient(135deg, #4a9eff, #3b7dd8);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .btn-scan:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.3);
        }
        
        .btn-scan:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-scan .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        .btn-scan.scanning .spinner {
            display: inline-block;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* ===== PROGRESS ===== */
        .progress-wrapper {
            margin-bottom: 24px;
        }
        
        .progress-wrapper .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .progress-wrapper .progress-info .percentage {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .progress {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        
        /* ===== STATUS TEXT ===== */
        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        .status-text .icon { font-size: 16px; }
        .status-text.idle .icon { color: var(--text-secondary); }
        .status-text.scanning .icon { color: var(--accent-blue); animation: pulse 1s infinite; }
        .status-text.complete .icon { color: var(--accent-green); }
        .status-text.error .icon { color: var(--accent-red); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* ===== RESULTS TABLE ===== */
        .results-section {
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        
        .results-section .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .results-section .section-title .count {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.06);
            padding: 2px 12px;
            border-radius: 20px;
        }
        
        .table-custom {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .table-custom thead th {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        
        .table-custom tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }
        
        .table-custom tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .table-custom .port-number {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-primary);
        }
        
        .table-custom .status-open {
            color: var(--accent-green);
            font-weight: 500;
        }
        
        .table-custom .service-name {
            font-weight: 500;
        }
        
        .table-custom .banner-text {
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .badge-vuln {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-vuln.critical { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); border: 1px solid rgba(248, 81, 73, 0.2); }
        .badge-vuln.high { background: rgba(210, 153, 34, 0.2); color: var(--accent-yellow); border: 1px solid rgba(210, 153, 34, 0.2); }
        .badge-vuln.medium { background: rgba(74, 158, 255, 0.15); color: var(--accent-blue); border: 1px solid rgba(74, 158, 255, 0.15); }
        .badge-vuln.none { background: rgba(63, 185, 80, 0.12); color: var(--accent-green); border: 1px solid rgba(63, 185, 80, 0.12); }
        
        /* ===== EXPORT BUTTONS ===== */
        .export-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn-export {
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-export:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }
        
        .btn-export .fa { font-size: 14px; }
        
        .btn-export.pdf { border-color: rgba(248, 81, 73, 0.3); color: var(--accent-red); }
        .btn-export.pdf:hover { background: rgba(248, 81, 73, 0.1); border-color: var(--accent-red); }
        .btn-export.txt { border-color: rgba(74, 158, 255, 0.3); color: var(--accent-blue); }
        .btn-export.txt:hover { background: rgba(74, 158, 255, 0.1); border-color: var(--accent-blue); }
        .btn-export.csv { border-color: rgba(63, 185, 80, 0.3); color: var(--accent-green); }
        .btn-export.csv:hover { background: rgba(63, 185, 80, 0.1); border
