<!DOCTYPE html>
<html>
<head>
    <title>Port Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0618;
            --bg-secondary: #120c24;
            --bg-card: #1a1035;
            --border-color: #3a2a6a;
            --text-primary: #e8e0f5;
            --text-secondary: #a890d0;
            --accent-purple: #8b5cf6;
            --accent-purple-dark: #6d3bd8;
            --accent-purple-light: #a78bfa;
            --accent-green: #3fb950;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(100, 70, 200, 0.3);
            padding: 28px;
        }

        .card-header h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6, #6d3bd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 14px;
            transition: border 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        .btn-scan {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple-dark));
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-scan:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .progress {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-purple-light));
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .results-section {
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table th {
            text-align: left;
            padding: 10px 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        table tbody tr:hover {
            background: rgba(139, 92, 246, 0.08);
        }

        .status-open {
            color: var(--accent-green);
        }

        .btn-export {
            margin-top: 16px;
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-export:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--accent-purple);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Network Reconnaissance Toolkit</h1>

    <div class="input-group">
        <input type="text" id="target" value="localhost">
        <button class="btn-scan" id="scanBtn">Start Scan</button>
    </div>

    <div class="status" id="statusText">Ready to scan</div>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="results" id="resultsSection" style="display: none;">
        <h3>📊 Open Ports Found</h3>
        <table>
            <thead>
                <tr>
                    <th>Port</th>
                    <th>Status</th>
                    <th>Service</th>
                </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
        </table>
        <button class="btn-export" id="exportBtn">📥 Export Report</button>
    </div>
</div>

<script>
    const services = {
    22: 'SSH', 80: 'HTTP', 443: 'HTTPS',
    21: 'FTP', 23: 'Telnet', 25: 'SMTP',
    53: 'DNS', 110: 'POP3', 135: 'RPC',
    139: 'NetBIOS', 143: 'IMAP', 445: 'SMB',
    993: 'IMAPS', 995: 'POP3S', 1723: 'PPTP',
    3306: 'MySQL', 3389: 'RDP', 5900: 'VNC',
    8080: 'HTTP-Alt', 8443: 'HTTPS-Alt',
    32: 'SAP', 42: 'WINS', 52: 'XNS', 62: 'ACAS'
};

    let interval = null;

    document.getElementById('scanBtn').onclick = function() {
        const target = document.getElementById('target').value.trim();
        if (!target) {
            alert('Enter a target');
            return;
        }

        console.log('Scanning:', target);
        this.disabled = true;
        this.textContent = 'Scanning...';
        document.getElementById('statusText').textContent = '🔍 Scanning...';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('resultsSection').style.display = 'none';

        fetch('/api/scan/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: target })
        }).then(() => {
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                fetch('/api/scan/status')
                    .then(r => r.json())
                    .then(data => {
                        console.log('Status:', data);
                        document.getElementById('progressBar').style.width = data.progress + '%';

                        if (data.open_ports && data.open_ports.length > 0) {
                            document.getElementById('resultsSection').style.display = 'block';
                            const table = document.getElementById('resultsTable');
                            table.innerHTML = '';
                            data.open_ports.forEach(port => {
                                const service = services[port] || 'Unknown';
                                table.innerHTML += `
                                    <tr>
                                        <td><strong>${port}</strong></td>
                                        <td class="open">✅ OPEN</td>
                                        <td>${service}</td>
                                    </tr>
                                `;
                            });
                        }

                        if (data.completed) {
                            clearInterval(interval);
                            document.getElementById('scanBtn').disabled = false;
                            document.getElementById('scanBtn').textContent = 'Start Scan';
                            document.getElementById('statusText').textContent = '✅ Scan complete!';
                            console.log('Scan complete!');
                        }
                    });
            }, 1000);
        });
    };

    document.getElementById('exportBtn').onclick = function() {
        this.textContent = 'Generating...';
        fetch('/api/scan/report', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                alert('Reports generated! Check your folder.');
                this.textContent = '📥 Export Report';
            })
            .catch(() => {
                alert('Error generating report');
                this.textContent = '📥 Export Report';
            });
    };
</script>

</body>
</html>
